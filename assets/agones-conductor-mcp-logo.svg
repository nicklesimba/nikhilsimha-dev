<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <clipPath id="frame"><rect x="2" y="2" width="124" height="124" rx="26"/></clipPath>

  <rect x="2" y="2" width="124" height="124" rx="26" fill="#FFFFFF"/>

  <!-- wavy backdrop: the score behind the conductor -->
  <g clip-path="url(#frame)" fill="none" stroke="#2d70de" stroke-opacity="0.1" stroke-width="7">
    <path d="M -12 12 Q 20 4 52 12 T 116 12 T 180 12"/>
    <path d="M -12 36 Q 20 28 52 36 T 116 36 T 180 36"/>
    <path d="M -12 60 Q 20 52 52 60 T 116 60 T 180 60"/>
    <path d="M -12 84 Q 20 76 52 84 T 116 84 T 180 84"/>
    <path d="M -12 108 Q 20 100 52 108 T 116 108 T 180 108"/>
  </g>

  <!-- conductor: continuous silhouette, both arms raised mid-crescendo -->
  <g fill="#2d70de">
    <path d="M 30 112 C 30 84 45 62 64 62 C 83 62 98 84 98 112 Z"/>
    <rect x="58" y="50" width="12" height="16"/>
    <circle cx="64" cy="42" r="15"/>
  </g>
  <g fill="none" stroke="#2d70de" stroke-width="10" stroke-linecap="round">
    <path d="M 88 76 C 94 68 98 60 101 52"/>
    <path d="M 40 76 C 34 68 30 60 27 52"/>
  </g>

  <!-- collar -->
  <path d="M 54.5 62.5 L 64 80 L 73.5 62.5 Z" fill="#FFFFFF"/>

  <!-- bowtie -->
  <g fill="#17252e">
    <path d="M 62 66.5 L 53.5 62 L 53.5 71 Z"/>
    <path d="M 66 66.5 L 74.5 62 L 74.5 71 Z"/>
    <circle cx="64" cy="66.5" r="2.8"/>
  </g>

  <!-- mustache -->
  <g fill="#17252e">
    <path d="M 64 47.5 Q 58 45 53.5 47.5 Q 52 48.5 53.5 49.2 Q 59 50.8 64 49.2 Z"/>
    <path d="M 64 47.5 Q 70 45 74.5 47.5 Q 76 48.5 74.5 49.2 Q 69 50.8 64 49.2 Z"/>
  </g>

  <!-- baton -->
  <path d="M 104 48 L 114 33" fill="none" stroke="#17252e" stroke-width="4" stroke-linecap="round"/>

  <rect x="2" y="2" width="124" height="124" rx="26" fill="none" stroke="#2d70de" stroke-width="2"/>
</svg>
